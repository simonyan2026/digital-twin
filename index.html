<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin Progress — Simon's AI Clone</title>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: rgba(0,0,0,0.15);
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.4);
    --critical: #ef4444;
    --moderate: #f59e0b;
    --strong: #22c55e;
    --text-primary: #f1f5f9;
    --text-secondary: rgba(241,245,249,0.65);
    --thermometer-width: 52px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px;
    overflow-x: hidden;
  }

  /* Animated background orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: 0;
    animation: float 20s ease-in-out infinite;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #3b82f6, transparent 70%);
    top: -100px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8b5cf6, transparent 70%);
    bottom: -80px; right: -80px;
    animation-delay: -10s;
  }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-20px) scale(1.05); }
    66% { transform: translate(-20px,30px) scale(0.95); }
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Glass panel */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* ─── HEADER ─── */
  .header {
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .avatar {
    width:52px; height:52px; border-radius:16px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:700; color:#fff;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
  }
  .header-title { font-size:22px; font-weight:700; letter-spacing:-0.3px; }
  .header-sub { font-size:13px; color:var(--text-secondary); margin-top:2px; }
  .header-right { text-align:right; }
  .update-time { font-size:12px; color:var(--text-secondary); }
  .overall-badge {
    display:inline-flex; align-items:baseline; gap:6px;
    margin-top:4px; font-size:14px; font-weight:600; color:var(--accent);
  }
  .overall-badge .num { font-size:32px; font-weight:800; letter-spacing:-1px; }

  /* ─── ETA PANEL ─── */
  .eta-panel {
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
  }
  .eta-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .eta-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .eta-target-date {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .eta-sub {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .eta-countdown {
    display: flex;
    gap: 10px;
  }
  .eta-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 44px;
  }
  .eta-unit-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }
  .eta-unit-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 1px;
  }
  .eta-divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.08);
    align-self: center;
  }
  .eta-progress-ring {
    position: relative;
    width: 52px;
    height: 52px;
  }
  .eta-progress-ring svg {
    transform: rotate(-90deg);
    width: 52px;
    height: 52px;
  }
  .eta-progress-ring .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 4;
  }
  .eta-progress-ring .ring-fill {
    fill: none;
    stroke: url(#etaGradient);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 2s ease;
  }
  .eta-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .eta-ring-pct {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .eta-ring-label {
    font-size: 7px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── MAIN GRID ─── */
  .main-grid {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ─── THERMOMETER ─── */
  .thermo-panel {
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .thermo-label { font-size:12px; color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:1px; }
  .thermometer {
    position: relative;
    width: var(--thermometer-width);
    height: 340px;
    border-radius: 26px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
  }
  .thermo-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-radius: 0 0 25px 25px;
    transition: height 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(to top, #ef4444 0%, #f59e0b 40%, #22c55e 70%, #3b82f6 100%);
    box-shadow: 0 -4px 20px var(--accent-glow);
  }
  .thermo-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 6px; right: 6px; height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.25);
    filter: blur(2px);
  }
  .thermo-ticks {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .thermo-tick {
    position: absolute;
    right: 6px;
    width: 12px; height: 1px;
    background: rgba(255,255,255,0.15);
  }
  .thermo-tick-label {
    position: absolute;
    right: 22px;
    font-size: 10px;
    color: var(--text-secondary);
    transform: translateY(-50%);
  }
  .milestone-marker {
    position: absolute;
    left: 6px; right: 6px;
    height: 2px;
    border-top: 2px dashed rgba(255,255,255,0.2);
  }
  .milestone-marker.reached { border-top-color: rgba(34,197,94,0.5); }

  .thermo-score-display {
    font-size:36px; font-weight:800; letter-spacing:-1.5px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .thermo-target { font-size:11px; color:var(--text-secondary); }

  /* ─── DIMENSIONS PANEL ─── */
  .dims-panel {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .dims-title { font-size:14px; font-weight:700; color:var(--text-secondary); margin-bottom:4px; }

  .dim-card {
    display: grid;
    grid-template-columns: 36px 1fr 56px;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s ease;
    cursor: default;
  }
  .dim-card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.12);
    transform: translateX(4px);
  }
  .dim-icon {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    background: rgba(255,255,255,0.06);
  }
  .dim-info { flex:1; min-width:0; }
  .dim-name { font-size:14px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .dim-weight { font-size:10px; color:var(--text-secondary); background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:4px; }
  .dim-bar-track {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0;
  }
  .dim-bar-fill.critical { background: linear-gradient(90deg, #ef4444, #f87171); }
  .dim-bar-fill.moderate { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .dim-bar-fill.strong   { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .dim-score {
    font-size:20px; font-weight:800; text-align:right;
    font-variant-numeric: tabular-nums;
  }
  .dim-score.critical { color:#f87171; }
  .dim-score.moderate { color:#fbbf24; }
  .dim-score.strong   { color:#4ade80; }

  .dim-bottleneck {
    font-size:11px; color:var(--text-secondary); margin-top:4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ─── MILESTONES ─── */
  .milestones-panel {
    padding: 24px 28px;
  }
  .milestones-title { font-size:14px; font-weight:700; color:var(--text-secondary); margin-bottom:16px; }
  .milestones-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }
  .ms-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
    z-index: 1;
  }
  .ms-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.15);
    margin-bottom: 8px;
    transition: all 0.5s ease;
  }
  .ms-dot.reached {
    background: var(--strong);
    border-color: var(--strong);
    box-shadow: 0 0 12px rgba(34,197,94,0.5);
  }
  .ms-dot.current {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px var(--accent-glow); }
    50% { box-shadow: 0 0 24px var(--accent-glow), 0 0 48px rgba(59,130,246,0.15); }
  }
  .ms-label { font-size:11px; color:var(--text-secondary); text-align:center; }
  .ms-score { font-size:10px; color:var(--text-secondary); opacity:0.6; margin-top:2px; }
  .ms-line {
    position: absolute;
    top: 9px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    z-index: 0;
  }
  .ms-line-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--strong), var(--accent));
    transition: width 1.8s ease;
    border-radius: 1px;
  }

  /* ─── CHANGELOG ─── */
  .changelog-panel {
    padding: 20px 28px;
  }
  .changelog-title { font-size:14px; font-weight:700; color:var(--text-secondary); margin-bottom:12px; }
  .changelog-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .changelog-date { font-size:12px; color:var(--accent); font-weight:600; min-width:90px; }
  .changelog-event { font-size:13px; font-weight:600; }
  .changelog-detail { font-size:12px; color:var(--text-secondary); }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.5;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .thermo-panel {
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }
    .thermometer {
      width: 100%;
      height: 40px;
      border-radius: 20px;
    }
    .thermo-fill {
      left: 0; bottom: 0; top: 0; right: auto;
      border-radius: 19px 0 0 19px;
      height: 100% !important;
    }
    .eta-panel { flex-direction: column; align-items: flex-start; }
    .eta-countdown { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const DATA_URL = './progress-data.json';

async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    return await resp.json();
  } catch(e) {
    console.error('Failed to load data:', e);
    return null;
  }
}

function getStatusClass(score) {
  if (score < 30) return 'critical';
  if (score < 60) return 'moderate';
  return 'strong';
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
}

function getCountdown(targetDateStr) {
  const now = new Date();
  const target = new Date(targetDateStr);
  const diff = target - now;
  if (diff <= 0) return { days: 0, hours: 0, mins: 0, elapsed: true };
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return { days, hours, mins, elapsed: false };
}

function getTimeElapsedPercent(startStr, endStr) {
  const now = new Date();
  const start = new Date(startStr);
  const end = new Date(endStr);
  const total = end - start;
  const elapsed = now - start;
  if (total <= 0) return 100;
  return Math.min(100, Math.max(0, (elapsed / total) * 100));
}

function render(data) {
  const app = document.getElementById('app');
  const countdown = getCountdown(data.estimatedDate);
  const timeElapsed = getTimeElapsedPercent(data.startDate, data.estimatedDate);
  const circumference = 2 * Math.PI * 34;
  const ringOffset = circumference - (data.overallScore / 100) * circumference;

  let currentMilestoneIdx = 0;
  data.milestones.forEach((m, i) => {
    if (data.overallScore >= m.score) currentMilestoneIdx = i + 1;
  });

  const msPercent = Math.min(100, (data.overallScore / 100) * 100);
  const sortedDims = [...data.dimensions].sort((a, b) => b.weight - a.weight);

  app.innerHTML = `
    <!-- HEADER -->
    <div class="glass header">
      <div class="header-left">
        <div class="avatar">S</div>
        <div>
          <div class="header-title">Simon's Digital Twin</div>
          <div class="header-sub">AI Clone Evolution Tracker</div>
        </div>
      </div>
      <div class="header-right">
        <div class="update-time">Updated ${formatDate(data.lastUpdated)}</div>
        <div class="overall-badge">
          Overall <span class="num">${data.overallScore}%</span>
        </div>
      </div>
    </div>

    <!-- ETA PANEL -->
    <div class="glass eta-panel">
      <div class="eta-left">
        <div class="eta-label">Estimated Full Digitization</div>
        <div class="eta-target-date">${data.estimatedFullDigitization}</div>
        <div class="eta-sub">${countdown.elapsed ? 'Target date reached — reassessing...' : 'Countdown to 100% replacement'}</div>
      </div>
      <div class="eta-countdown">
        <div class="eta-unit">
          <div class="eta-unit-value" id="etaDays">${countdown.days}</div>
          <div class="eta-unit-label">Days</div>
        </div>
        <div class="eta-divider"></div>
        <div class="eta-unit">
          <div class="eta-unit-value" id="etaHours">${countdown.hours}</div>
          <div class="eta-unit-label">Hours</div>
        </div>
        <div class="eta-divider"></div>
        <div class="eta-unit">
          <div class="eta-unit-value" id="etaMins">${countdown.mins}</div>
          <div class="eta-unit-label">Mins</div>
        </div>
      </div>
      <div class="eta-progress-ring">
        <svg viewBox="0 0 80 80">
          <defs>
            <linearGradient id="etaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="40" cy="40" r="34"/>
          <circle class="ring-fill" cx="40" cy="40" r="34"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}" 
            id="etaRing"/>
        </svg>
        <div class="eta-ring-text">
          <div class="eta-ring-pct" id="etaRingPct">0%</div>
          <div class="eta-ring-label">Complete</div>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <div class="glass thermo-panel">
        <div class="thermo-label">Progress</div>
        <div class="thermometer">
          <div class="thermo-fill" id="thermoFill" style="height:0%"></div>
          <div class="thermo-ticks">
            ${[0,25,50,75,100].map(v => `
              <div class="thermo-tick" style="bottom:${v}%"></div>
              <div class="thermo-tick-label" style="bottom:${v}%">${v}</div>
            `).join('')}
          </div>
          ${data.milestones.map(m => `
            <div class="milestone-marker ${data.overallScore >= m.score ? 'reached' : ''}" 
                 style="bottom:${m.score}%" title="${m.label}"></div>
          `).join('')}
        </div>
        <div class="thermo-score-display" id="thermoScore">0%</div>
        <div class="thermo-target">Target 100%</div>
      </div>

      <div class="glass dims-panel">
        <div class="dims-title">7-Dimension Capability Radar</div>
        ${sortedDims.map(dim => {
          const sc = getStatusClass(dim.score);
          return `
            <div class="dim-card">
              <div class="dim-icon">${dim.icon}</div>
              <div class="dim-info">
                <div class="dim-name">
                  ${dim.name}
                  <span class="dim-weight">Weight ${dim.weight}%</span>
                </div>
                <div class="dim-bar-track">
                  <div class="dim-bar-fill ${sc}" data-score="${dim.score}"></div>
                </div>
                <div class="dim-bottleneck">⚠ ${dim.bottleneck}</div>
              </div>
              <div class="dim-score ${sc}">${dim.score}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- MILESTONES -->
    <div class="glass milestones-panel">
      <div class="milestones-title">Evolution Milestones</div>
      <div class="milestones-track">
        <div class="ms-line">
          <div class="ms-line-fill" id="msLineFill" style="width:0%"></div>
        </div>
        ${data.milestones.map((m, i) => {
          const reached = data.overallScore >= m.score;
          const isCurrent = i === currentMilestoneIdx - 1 || 
                            (i === 0 && currentMilestoneIdx === 0);
          const isNext = i === currentMilestoneIdx;
          return `
            <div class="ms-node">
              <div class="ms-dot ${reached ? 'reached' : ''} ${(isCurrent && reached) || (isNext && !reached) ? 'current' : ''}"></div>
              <div class="ms-label">${m.label}</div>
              <div class="ms-score">${m.score}%</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- CHANGELOG -->
    <div class="glass changelog-panel">
      <div class="changelog-title">Evolution Log</div>
      ${data.changelog.map(c => `
        <div class="changelog-item">
          <div class="changelog-date">${c.date}</div>
          <div>
            <div class="changelog-event">${c.event}</div>
            <div class="changelog-detail">${c.detail}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="footer">
      Digital Twin Progress Tracker · Built for Simon · Powered by AI
    </div>
  `;

  // Animate in
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('thermoFill').style.height = data.overallScore + '%';
      animateCounter('thermoScore', 0, data.overallScore, 1800, '%');
      
      document.querySelectorAll('.dim-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.score + '%';
      });

      document.getElementById('msLineFill').style.width = msPercent + '%';

      // ETA ring animation
      const ring = document.getElementById('etaRing');
      if (ring) {
        ring.style.strokeDashoffset = ringOffset;
      }
      animateCounter('etaRingPct', 0, data.overallScore, 1800, '%');
    }, 300);
  });

  // Live countdown update
  setInterval(() => {
    const cd = getCountdown(data.estimatedDate);
    const daysEl = document.getElementById('etaDays');
    const hoursEl = document.getElementById('etaHours');
    const minsEl = document.getElementById('etaMins');
    if (daysEl) daysEl.textContent = cd.days;
    if (hoursEl) hoursEl.textContent = cd.hours;
    if (minsEl) minsEl.textContent = cd.mins;
  }, 60000);
}

function animateCounter(id, from, to, duration, suffix) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(from + (to - from) * eased);
    el.textContent = current + (suffix || '');
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// Init
loadData().then(data => {
  if (data) render(data);
});

// Auto-refresh every 5 minutes
setInterval(async () => {
  const data = await loadData();
  if (data) render(data);
}, 5 * 60 * 1000);
</script>
